{%load static tailwind_tags%}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
        Default Title
        {% endblock %}
    </title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% tailwind_css %}
</head>
<body>
    <nav class="bg-amber-600 border-b-4 border-amber-800 shadow-md">
        <ul class="flex flex-wrap justify-center gap-6 px-4 py-3">
            <li><a href="{% url 'home' %}" class="font-bold text-white hover:text-amber-100 transition">Home</a></li>
            <li><a href="{% url 'about' %}" class="font-bold text-white hover:text-amber-100 transition">About</a></li>
            <li><a href="{% url 'contact' %}" class="font-bold text-white hover:text-amber-100 transition">Contact</a></li>
            <li><a href="{% url 'services' %}" class="font-bold text-white hover:text-amber-100 transition">Services</a></li>
            <li><a href="{% url 'products' %}" class="font-bold text-white hover:text-amber-100 transition">Products</a></li>
            <li><a href="{% url 'all_django' %}" class="font-bold text-white hover:text-amber-100 transition">All Django</a></li>
        </ul>
    </nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
