{% extends 'website/layout.html' %}

{% block title %}
    Home
{% endblock %}

{% block content %}
    <h1 class="bg-amber-300 text-3xl font-bold text-center py-4">Welcome to MY TEAAA Junction</h1>
    <p class="bg-amber-500 text-center mb-6">Make your purchase today!</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-4">
        {% for product in products %}
            <div class="product-item border rounded-lg shadow-lg overflow-hidden">
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-xl font-bold mb-2">{{ product.name }}</h2>
                    <p class="text-black mb-4">{{ product.description }}</p>
                    <p class="text-lg font-semibold text-green-600 mb-4">Price: ₹{{ product.price }}</p>
                    <button class="bg-orange-500 text-brown-400 py-1 rounded hover:bg-orange-600">Buy now</button>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
